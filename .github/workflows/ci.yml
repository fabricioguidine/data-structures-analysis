name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Show versions
        run: |
          java -version
          mvn -v

      - name: Spotless check
        run: mvn --no-transfer-progress -B spotless:check

      - name: Checkstyle
        run: mvn --no-transfer-progress -B checkstyle:check

      - name: Run unit & integration tests with coverage
        run: mvn --no-transfer-progress -B verify

      - name: Upload JaCoCo report
        if: matrix.java == '21'
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload coverage to Codecov
        if: matrix.java == '21'
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
